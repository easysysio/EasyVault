# =============================================================================
# release.yml — build packages and publish a GitHub release on tag push
#
# Triggered by pushing a tag like v0.1.0. Produces:
#   * Linux .deb and .rpm for x86_64 and aarch64 (cross-compiled via zig)
#   * Windows installer (.exe) built with NSIS
# then creates a GitHub Release whose notes are the matching CHANGELOG section.
# =============================================================================

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Linux: cross-build both arches with cargo-zigbuild, package deb + rpm.
  # ---------------------------------------------------------------------------
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig
        uses: mlugg/setup-zig@v1

      - name: Install cargo packaging tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild,cargo-deb,cargo-generate-rpm

      - name: Build (release)
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Stage binary at the path the packaging metadata expects
        run: |
          mkdir -p target/release
          cp "target/${{ matrix.target }}/release/easyvault" target/release/easyvault

      - name: Build .deb
        run: cargo deb --no-build --no-strip --target ${{ matrix.target }} --output dist/

      - name: Build .rpm
        run: cargo generate-rpm --target ${{ matrix.target }} --output dist/

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: dist/*

  # ---------------------------------------------------------------------------
  # Windows: native build + NSIS installer.
  # ---------------------------------------------------------------------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build (release)
        run: cargo build --release

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: cmd
        run: '"C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=${{ steps.ver.outputs.version }} packaging\windows\installer.nsi'

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: easyvault-*-setup.exe

  # ---------------------------------------------------------------------------
  # Release: gather artifacts, pull the matching CHANGELOG section, publish.
  # ---------------------------------------------------------------------------
  release:
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            /^## \[/ && flag { exit }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > RELEASE_NOTES.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/**/*
          fail_on_unmatched_files: true
